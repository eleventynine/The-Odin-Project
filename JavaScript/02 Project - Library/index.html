<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>The Odin Project - Javascript Course - Project - Library</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <table id="table-books">
      <thead id="table-header">
        <tr>
          <th id="row-title">Title</th>
          <th id="row-author">Author</th>
          <th id="row-pages">Pages</th>
          <th id="row-read" colspan="2">Read</th>
          <th id="row-delete"></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </body>

  <br />
  <button id="new-book-btn">New Book</button>

  <dialog id="form-container">
    <form id="book-form">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" required />

      <label for="author">Author</label>
      <input type="text" id="author" name="author" required />

      <label for="pages">Pages</label>
      <input type="number" id="pages" name="pages" required />

      <label for="read">Read</label>
      <select name="" id="read" required>
        <option value=""></option>
        <option value="read">Read</option>
        <option value="not read">Not Read</option>
      </select>

      <button type="submit">Add Book</button>
      <button type="cancel">Cancel</button>
    </form>
  </dialog>

  <script src="./script.js"></script>
</html>
